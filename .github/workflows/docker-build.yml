name: Build and push nimconnect-backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: image
        run: echo "owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          build-args: |
            COMMIT_HASH=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp || github.run_started_at }}
          tags: |
            ghcr.io/${{ steps.image.outputs.owner }}/nimconnect-backend:latest
            ghcr.io/${{ steps.image.outputs.owner }}/nimconnect-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
