name: Publish @nimconnect/profile-client

on:
  push:
    branches: [main]
    paths:
      - 'packages/profile-client/package.json'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm test --workspace=packages/profile-client
      - run: npm run build --workspace=packages/profile-client

      - name: Publish if version changed
        working-directory: packages/profile-client
        run: |
          PUBLISHED=$(npm view @nimconnect/profile-client version 2>/dev/null || echo "0.0.0")
          LOCAL=$(node -p "require('./package.json').version")
          if [ "$PUBLISHED" != "$LOCAL" ]; then
            echo "publishing $LOCAL (was $PUBLISHED)"
            npm publish --access public
          else
            echo "version $LOCAL already published, skipping"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
