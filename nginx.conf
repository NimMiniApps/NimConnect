server {
    listen 80;
    server_name _;

    # Required when proxy_pass uses a variable (/@handle → /p/$handle).
    resolver 127.0.0.11 valid=10s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # On-chain @handle public pages — OG shell served by the backend.
    location ~ "^/@(?<handle>[a-z0-9_]{3,26})$" {
        proxy_pass http://backend:8787/p/$handle;
        proxy_set_header Host $host;
    }

    # Hash-router SPA — serve index.html for direct hits to the origin.
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }
}
