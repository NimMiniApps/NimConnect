<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="NimConnect  Claim your Nimiq identity">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ec991c"/>
      <stop offset="1" stop-color="#e9b213"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f2348"/>
      <stop offset="0.55" stop-color="#2a3160"/>
      <stop offset="1" stop-color="#1a1e3d"/>
    </linearGradient>
    <radialGradient id="glow" cx="78%" cy="42%" r="45%">
      <stop offset="0" stop-color="#e9b213" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#e9b213" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- soft geometry -->
  <circle cx="980" cy="140" r="180" fill="#ffffff" fill-opacity="0.03"/>
  <circle cx="1080" cy="480" r="220" fill="#ffffff" fill-opacity="0.025"/>
  <path d="M0 520c180-60 360-40 540 10s360 40 540-20v120H0z" fill="#ffffff" fill-opacity="0.04"/>

  <!-- brand mark -->
  <g transform="translate(88,168)">
    <rect width="120" height="120" rx="28" fill="#161936"/>
    <path d="M60 14 96 36v44L60 102 24 80V36z" fill="url(#gold)"/>
    <circle cx="60" cy="48" r="11" fill="#161936"/>
    <path d="M38 78c0-12 10-19 22-19s22 7 22 19v3H38z" fill="#161936"/>
  </g>

  <text x="240" y="230" fill="#ffffff" font-family="Mulish, system-ui, sans-serif" font-size="72" font-weight="800" letter-spacing="-1.5">NimConnect</text>
  <text x="240" y="310" fill="#e9b213" font-family="Mulish, system-ui, sans-serif" font-size="36" font-weight="700">Claim your Nimiq identity.</text>
  <text x="240" y="370" fill="#c8cce0" font-family="Mulish, system-ui, sans-serif" font-size="26" font-weight="500">@handles · contacts · social payments</text>

  <!-- fake profile card -->
  <g transform="translate(820,145)">
    <rect width="300" height="340" rx="28" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.12"/>
    <circle cx="150" cy="110" r="54" fill="url(#gold)"/>
    <circle cx="150" cy="100" r="18" fill="#1f2348"/>
    <path d="M118 145c0-18 14-28 32-28s32 10 32 28v4H118z" fill="#1f2348"/>
    <text x="150" y="200" text-anchor="middle" fill="#ffffff" font-family="Mulish, system-ui, sans-serif" font-size="28" font-weight="800">@alex</text>
    <text x="150" y="236" text-anchor="middle" fill="#c8cce0" font-family="Mulish, system-ui, sans-serif" font-size="16" font-weight="500">Public profile</text>
    <rect x="54" y="268" width="192" height="36" rx="18" fill="url(#gold)"/>
    <text x="150" y="292" text-anchor="middle" fill="#1f2348" font-family="Mulish, system-ui, sans-serif" font-size="15" font-weight="800">Pay with NIM</text>
  </g>
</svg>
